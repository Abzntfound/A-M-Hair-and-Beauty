<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cart - A&M Hair & Beauty</title>

  <link rel="icon" href="/A&M.ico">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">

  <style>
    .cart-page { padding: 120px 5% 80px; min-height: 70vh; }

    .how-stripe {
      background: linear-gradient(135deg,#fdf2f8,#fce7f3);
      border-radius: 18px;
      padding: 2rem;
      margin: 3rem auto;
      max-width: 800px;
    }

    .how-steps {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .how-step { flex: 1; min-width: 160px; }

    .step-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #d946a6;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-bottom: .5rem;
    }

    .stripe-badge {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-top: 1rem;
      font-size: .8rem;
      color: #555;
    }
  </style>
</head>

<body>

<div id="header-placeholder"></div>

<section class="cart-page">

  <div id="cart-content"></div>

  <!-- Stripe info -->
  <div class="how-stripe scroll-reveal" id="how-stripe" style="display:none">

    <h3>🔒 Secure Checkout</h3>

    <div class="how-steps">

      <div class="how-step">
        <div class="step-num">1</div>
        <h4>Review cart</h4>
        <p>Check items before checkout.</p>
      </div>

      <div class="how-step">
        <div class="step-num">2</div>
        <h4>Stripe payment</h4>
        <p>Secure payment via Stripe.</p>
      </div>

      <div class="how-step">
        <div class="step-num">3</div>
        <h4>Confirmation</h4>
        <p>Email confirmation after purchase.</p>
      </div>

    </div>

    <div class="stripe-badge">
      Secured by Stripe
    </div>

  </div>

</section>

<div id="footer-placeholder"></div>

<!-- SCRIPTS -->
<script src="/data.js"></script>
<script src="/nav.js"></script>
<script src="/cart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  AM.renderHeader("Cart");
  AM.renderFooter();

  renderCartPage();

  const howEl = document.getElementById("how-stripe");

  function updateStripeBox() {
    const hasItems = getCart().length > 0;
    if (howEl) howEl.style.display = hasItems ? "block" : "none";
  }

  updateStripeBox();

  window.addEventListener("amCartUpdated", () => {
    renderCartPage();
    updateStripeBox();
  });

  AM.initScrollReveal();

});
</script>

</body>
</html>

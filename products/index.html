<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product — A&M Hair & Beauty</title>

<link rel="stylesheet" href="/styles.css">
<script src="/data.js" defer></script>
<script src="/nav.js" defer></script>
<script src="/cart.js" defer></script>

<style>
.detail-section { padding:120px 5% 80px; }
.detail-layout { display:grid; grid-template-columns:1fr 1fr; gap:3rem; max-width:1200px; margin:auto; }
.img-wrap img { width:100%; height:500px; object-fit:cover; border-radius:20px; }

.detail-price { font-size:2.4rem; font-weight:800; color:#d946a6; }
.detail-name { font-size:2rem; font-weight:700; }
.detail-desc { color:#666; line-height:1.7; }

.qty { display:flex; gap:10px; align-items:center; }
.qty button { width:30px; height:30px; }

@media(max-width:768px){
  .detail-layout { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div id="header-placeholder"></div>

<section class="detail-section">
<a href="/products/">← Back to Products</a>

<div id="product-detail" class="detail-layout">
  <p>Loading product...</p>
</div>
</section>

<div id="footer-placeholder"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    AM.renderHeader("Products");
    AM.renderFooter();

    if (!window.AM_PRODUCTS) {
        document.getElementById("product-detail").innerHTML =
            "<h2>Products failed to load</h2>";
        return;
    }

    const id = new URLSearchParams(location.search).get("id");

    const product = AM_PRODUCTS.find(p => String(p.id) === String(id));

    if (!product) {
        document.getElementById("product-detail").innerHTML =
            "<h2>Product not found</h2>";
        return;
    }

    let qty = 1;

    document.getElementById("product-detail").innerHTML = `
      <div class="img-wrap">
        <img src="${product.image}" alt="${product.name}">
      </div>

      <div>
        <div class="detail-price">£${product.price}</div>
        <div class="detail-name">${product.name}</div>
        <p class="detail-desc">${product.description || ""}</p>

        ${!product.discontinued ? `
        <div class="qty">
          <button id="minus">-</button>
          <span id="qty">1</span>
          <button id="plus">+</button>
        </div>

        <button id="add">Add to Cart</button>
        ` : `<p>Discontinued</p>`}
      </div>
    `;

    if (!product.discontinued) {
        document.getElementById("minus").onclick = () => {
            if (qty > 1) qty--;
            document.getElementById("qty").innerText = qty;
        };

        document.getElementById("plus").onclick = () => {
            qty++;
            document.getElementById("qty").innerText = qty;
        };

        document.getElementById("add").onclick = () => {
            addToCart(product.id, qty);
            AM.updateCartBadge();
        };
    }

});
</script>

</body>
</html>
